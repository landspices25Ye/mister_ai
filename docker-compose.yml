# Mister AI - Docker Compose
# docker-compose.yml

# version: '3.8'

services:
  # --- التطبيق الرئيسي ---
  app:
    build: .
    container_name: mister_ai_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=gpt-4o-mini
      - SYSTEM_PROMPT_PATH=/app/prompts/system_prompt.md
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    volumes:
      - ./curriculum:/app/curriculum
      - ./prompts:/app/prompts
      - ./data:/app/data
    depends_on:
      - postgres
      - redis
    networks:
      - mister_ai_network

  # --- قاعدة البيانات ---
  postgres:
    image: postgres:16-alpine
    container_name: mister_ai_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=mister_ai
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    networks:
      - mister_ai_network

  # --- قاعدة البيانات المتجهية (Qdrant) ---
  qdrant:
    image: qdrant/qdrant:v1.8.0
    container_name: mister_ai_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - mister_ai_network

  # --- التخزين المؤقت ---
  redis:
    image: redis:7-alpine
    container_name: mister_ai_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mister_ai_network

  # --- لوحة التحكم (اختياري) ---
  adminer:
    image: adminer
    container_name: mister_ai_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - mister_ai_network

# --- الشبكات ---
networks:
  mister_ai_network:
    driver: bridge

# --- التخزين ---
volumes:
  postgres_data:
  qdrant_data:
  redis_data:
