# Mister AI - Docker Compose (v2.1)
# Python 3.12 + LangChain v1.3+ + Gemini 3.1 Flash Lite
# 
# version: '3.8'

services:
  # --- التطبيق الرئيسي ---
  app:
    build: .
    container_name: mister_ai_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # LLM Provider
      - LLM_PROVIDER=${LLM_PROVIDER:-gemini}
      
      # Telegram
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      
      # Google Gemini
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-3.1-flash-lite}
      - GEMINI_EMBEDDING_MODEL=${GEMINI_EMBEDDING_MODEL:-models/embedding-2}
      
      # OpenAI
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      
      # PostgreSQL
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-mister_ai}
      
      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      
      # Qdrant
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-mister_ai_curriculum}
      
      # RAG
      - RAG_TOP_K=${RAG_TOP_K:-4}
      - RAG_SCORE_THRESHOLD=${RAG_SCORE_THRESHOLD:-0.7}
      - RAG_CHUNK_SIZE=${RAG_CHUNK_SIZE:-1000}
      - RAG_CHUNK_OVERLAP=${RAG_CHUNK_OVERLAP:-200}
      
      # LLM
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.7}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-1000}
      - LLM_TIMEOUT=${LLM_TIMEOUT:-30}
      
      # System Prompt
      - SYSTEM_PROMPT_PATH=/app/prompts/system_prompt.md
      
      # App
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENVIRONMENT=${ENVIRONMENT:-production}
    volumes:
      - ./curriculum:/app/curriculum
      - ./prompts:/app/prompts
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - mister_ai_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # --- قاعدة البيانات --- postgres:18-alpine
  postgres:
    image: postgres:16-alpine
    container_name: mister_ai_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-mister_ai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    networks:
      - mister_ai_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-mister_ai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- قاعدة البيانات المتجهية (Qdrant) --- qdrant/qdrant:v1.18.2
  qdrant:
    image: qdrant/qdrant:v1.18.2
    container_name: mister_ai_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/collections"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - mister_ai_network

  # --- التخزين المؤقت --- redis:8.2.7-alpine
  redis:
    image: redis:7-alpine
    container_name: mister_ai_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mister_ai_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- لوحة التحكم (اختياري) ---
  adminer:
    image: adminer:latest
    container_name: mister_ai_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - mister_ai_network

# --- الشبكات ---
networks:
  mister_ai_network:
    driver: bridge

# --- التخزين ---
volumes:
  postgres_data:
  qdrant_data:
  redis_data:
